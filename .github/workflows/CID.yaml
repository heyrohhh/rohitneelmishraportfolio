name: Rohit Portfolio CI/CD

on:
  push:
    branches: [ "main" ]

jobs:

  set-image-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build-and-push:
    runs-on: ubuntu-latest
    needs: set-image-version        # ← Fix 1: added this
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./frontendRohit/package-lock.json

      - name: Install & Audit
        working-directory: ./frontendRohit
        run: |
          npm ci
          npm audit fix
          npm audit --audit-level=moderate --force

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontendRohit/
          push: true
          tags: heyrohhh/portfolio:${{ needs.set-image-version.outputs.version }}